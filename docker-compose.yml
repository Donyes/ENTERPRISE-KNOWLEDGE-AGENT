services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: enterprise-knowledge-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: enterprise-knowledge-frontend
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api